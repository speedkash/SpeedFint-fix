<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Créer un lien de paiement</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0b0b;
            color: #e8e8e8;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 70px;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0b0b0b; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

        .header {
            background: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header-left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .logo { font-weight: 700; font-size: 20px; letter-spacing: -0.3px; color: #fff; text-decoration: none; }
        .logo .accent { color: #0ecb81; }
        .header-right { display: flex; align-items: center; gap: 6px; }
        .btn-header {
            padding: 7px 16px;
            border: 1px solid #2a2a2a;
            background: transparent;
            color: #aaa;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn-header:hover { background: #1a1a1a; color: #fff; border-color: #3a3a3a; }
        .btn-header .icon { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .btn-header.primary { background: #0ecb81; border-color: #0ecb81; color: #000; }
        .btn-header.primary:hover { background: #0dd68a; }
        .header-user { font-size: 13px; color: #888; padding: 0 4px; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f0f0f;
            border-top: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 64px;
            z-index: 1000;
            padding: 0 8px;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 6px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: #555;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.3px;
            min-width: 60px;
            background: transparent;
            border: none;
            font-family: inherit;
        }
        .nav-item .nav-icon { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .nav-item:hover { color: #888; }
        .nav-item.active { color: #0ecb81; }
        .nav-item.active .nav-icon { stroke: #0ecb81; }

        .container {
            max-width: 560px;
            margin: 0 auto;
            padding: 16px 16px 100px 16px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .page-title .icon { width: 28px; height: 28px; stroke: #0ecb81; stroke-width: 1.8; fill: none; }
        .page-sub { font-size: 14px; color: #666; margin-bottom: 20px; }

        .card {
            background: #0f0f0f;
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            padding: 24px 20px 20px;
            margin-bottom: 16px;
        }
        .card h3 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card h3 .icon { width: 20px; height: 20px; stroke: #f0b90b; stroke-width: 1.8; fill: none; }

        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 12px;
            color: #888;
            font-weight: 500;
            margin-bottom: 3px;
        }
        .form-group label .required { color: #f6465d; margin-left: 2px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            background: #000;
            border: 1px solid #1a1a1a;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            border-color: #0ecb81;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 70px;
        }
        .form-group input::placeholder { color: #444; }
        .form-group select option { background: #0f0f0f; }
        .form-group .hint { font-size: 11px; color: #555; margin-top: 3px; }
        .form-group .char-count { font-size: 11px; color: #555; text-align: right; margin-top: 3px; }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn:active { transform: scale(0.98); }
        .btn .icon { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .btn-gold { background: #f0b90b; color: #000; }
        .btn-gold:hover { background: #f5c81b; }
        .btn-green { background: #0ecb81; color: #000; }
        .btn-green:hover { background: #0dd68a; }
        .btn-back {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #aaa;
        }
        .btn-back:hover { background: #1a1a1a; color: #fff; }

        .msg { text-align: center; font-size: 13px; margin-top: 10px; min-height: 18px; font-weight: 500; }
        .msg.error { color: #f6465d; }
        .msg.success { color: #0ecb81; }

        .hidden { display: none !important; }

        /* ===== LINK RESULT ===== */
        .link-result {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 10px;
            padding: 14px;
            margin-top: 12px;
        }
        .link-result .link-url {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #000;
            border-radius: 8px;
            padding: 8px 12px;
            border: 1px solid #1a1a1a;
            word-break: break-all;
        }
        .link-result .link-url .url {
            flex: 1;
            font-family: 'Inter', monospace;
            font-size: 13px;
            color: #0ecb81;
        }
        .link-result .link-url .copy-btn {
            background: transparent;
            border: none;
            color: #555;
            cursor: pointer;
            padding: 4px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
        }
        .link-result .link-url .copy-btn svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 1.8; fill: none; }
        .link-result .link-url .copy-btn:hover { color: #0ecb81; }

        .link-result .link-preview {
            display: flex;
            gap: 12px;
            margin-top: 10px;
            padding: 10px;
            background: #0f0f0f;
            border-radius: 8px;
            border: 1px solid #161616;
        }
        .link-result .link-preview .preview-img {
            width: 60px;
            height: 60px;
            border-radius: 8px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
            font-size: 24px;
            color: #555;
        }
        .link-result .link-preview .preview-img img { width: 100%; height: 100%; object-fit: cover; }
        .link-result .link-preview .preview-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .link-result .link-preview .preview-info .p-name { font-weight: 600; font-size: 14px; color: #fff; }
        .link-result .link-preview .preview-info .p-amount { font-size: 16px; font-weight: 700; color: #f0b90b; }
        .link-result .link-preview .preview-info .p-desc { font-size: 12px; color: #666; }

        .link-result .link-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .link-result .link-actions .btn-sm {
            flex: 1;
            padding: 8px;
            border: 1px solid #2a2a2a;
            background: transparent;
            color: #aaa;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .link-result .link-actions .btn-sm svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.8; fill: none; }
        .link-result .link-actions .btn-sm:hover { background: #1a1a1a; color: #fff; border-color: #3a3a3a; }
        .link-result .link-actions .btn-sm.primary { background: #0ecb81; color: #000; border-color: #0ecb81; }
        .link-result .link-actions .btn-sm.primary:hover { background: #0dd68a; }

        /* ===== LISTE DES LIENS ===== */
        .link-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #0a0a0a;
            border: 1px solid #161616;
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .link-item:hover { border-color: #2a2a2a; background: #0f0f0f; }
        .link-item .l-left { display: flex; flex-direction: column; }
        .link-item .l-name { font-weight: 600; font-size: 14px; color: #fff; }
        .link-item .l-amount { font-size: 13px; color: #f0b90b; }
        .link-item .l-status {
            font-size: 10px;
            padding: 2px 10px;
            border-radius: 10px;
            font-weight: 500;
        }
        .link-item .l-status.active { background: rgba(14,203,129,0.12); color: #0ecb81; }
        .link-item .l-status.inactive { background: rgba(246,70,93,0.12); color: #f6465d; }
        .link-item .l-status.pending { background: rgba(240,185,11,0.12); color: #f0b90b; }
        .link-item .l-date { font-size: 10px; color: #555; }

        @media (max-width: 480px) {
            .container { padding: 12px 12px 100px 12px; }
            .card { padding: 18px 14px 16px; }
            .page-title { font-size: 20px; }
            .link-result .link-preview { flex-direction: column; align-items: center; text-align: center; }
            .link-result .link-preview .preview-img { width: 80px; height: 80px; }
            .link-result .link-actions { flex-wrap: wrap; }
            .link-item { flex-direction: column; align-items: stretch; gap: 4px; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-left">
        <a href="/wallet" class="logo"><span class="accent">FIX</span>/USD</a>
    </div>
    <div class="header-right">
        <span class="header-user" id="header_user">--</span>
        <button class="btn-header primary" onclick="doLogout()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Déconnexion
        </button>
    </div>
</header>

<div class="container">

    <div class="page-title">
        <svg class="icon" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Liens de paiement
    </div>
    <div class="page-sub">Créez des liens pour recevoir des paiements en FIX</div>

    <!-- ===== CRÉER UN LIEN ===== -->
    <div class="card">
        <h3>
            <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v8"/><path d="M8 12h8"/></svg>
            Nouveau lien
        </h3>

        <div class="form-group">
            <label>Nom du produit/service <span class="required">*</span></label>
            <input type="text" id="linkName" placeholder="Ex: Formation Trading FIX" maxlength="100">
            <div class="hint"><span id="charCount">0</span>/100 caractères</div>
        </div>

        <div class="form-group">
            <label>Description <span class="required">*</span></label>
            <textarea id="linkDesc" placeholder="Décrivez ce que vous vendez..." maxlength="500"></textarea>
            <div class="hint"><span id="descCount">0</span>/500 caractères</div>
        </div>

        <div class="form-group">
            <label>Montant (FIX) <span class="required">*</span></label>
            <input type="number" id="linkAmount" placeholder="1000" min="1" step="1">
            <div class="hint">Montant minimum : 1 FIX</div>
        </div>

        <div class="form-group">
            <label>Photo (optionnel)</label>
            <input type="file" id="linkImage" accept="image/*">
            <div class="hint">Format : PNG, JPG, GIF (max 5MB)</div>
        </div>

        <div class="form-group">
            <label>Expiration</label>
            <select id="linkExpiry">
                <option value="never">Jamais</option>
                <option value="24h">24 heures</option>
                <option value="7d">7 jours</option>
                <option value="30d">30 jours</option>
                <option value="custom">Personnalisé</option>
            </select>
        </div>

        <button class="btn btn-gold" onclick="createPaymentLink()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22l-4-9-9-4z"/></svg>
            Générer le lien
        </button>
        <div class="msg" id="formMsg"></div>

        <!-- ===== RÉSULTAT ===== -->
        <div id="linkResult" class="hidden link-result">
            <div class="link-url">
                <span class="url" id="generatedLink">--</span>
                <button class="copy-btn" onclick="copyLink()">
                    <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </button>
            </div>
            <div class="link-preview" id="linkPreview">
                <div class="preview-img" id="previewImg">📷</div>
                <div class="preview-info">
                    <span class="p-name" id="previewName">--</span>
                    <span class="p-amount" id="previewAmount">-- FIX</span>
                    <span class="p-desc" id="previewDesc">--</span>
                </div>
            </div>
            <div class="link-actions">
                <button class="btn-sm primary" onclick="copyLink()">
                    <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    Copier le lien
                </button>
                <button class="btn-sm" onclick="shareLink()">
                    <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                    Partager
                </button>
                <button class="btn-sm" onclick="closeResult()">
                    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    Fermer
                </button>
            </div>
        </div>
    </div>

    <!-- ===== MES LIENS ===== -->
    <div class="card">
        <h3>
            <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Mes liens
            <span style="font-weight:400;color:#666;font-size:13px;margin-left:auto;" id="linkCount">0</span>
        </h3>
        <div id="linksList">
            <div class="history-empty">Aucun lien créé</div>
        </div>
    </div>

</div>

<script>
    // ============================================================
    //  VARIABLES
    // ============================================================
    let currentUser = null;
    let generatedLink = '';
    let links = [];
    let selectedImage = null;

    // ============================================================
    //  AUTH
    // ============================================================
    async function doLogout() {
        await fetch("/api/logout", {method: "POST"});
        window.location.href = "/";
    }

    async function loadUserInfo() {
        try {
            const r = await fetch("/api/me");
            const d = await r.json();
            if (d.success && d.user) {
                currentUser = d.user;
                document.getElementById("header_user").textContent = d.user.username;
                return d.user;
            } else {
                window.location.href = "/";
            }
        } catch(e) {
            window.location.href = "/";
        }
    }

    // ============================================================
    //  CHARACTER COUNTS
    // ============================================================
    document.getElementById('linkName').addEventListener('input', function() {
        document.getElementById('charCount').textContent = this.value.length;
    });

    document.getElementById('linkDesc').addEventListener('input', function() {
        document.getElementById('descCount').textContent = this.value.length;
    });

    // ============================================================
    //  IMAGE PREVIEW
    // ============================================================
    document.getElementById('linkImage').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                selectedImage = event.target.result;
                document.getElementById('previewImg').innerHTML = `<img src="${selectedImage}" alt="Preview">`;
            };
            reader.readAsDataURL(file);
        }
    });

    // ============================================================
    //  CRÉER UN LIEN
    // ============================================================
    async function createPaymentLink() {
        const name = document.getElementById('linkName').value.trim();
        const desc = document.getElementById('linkDesc').value.trim();
        const amount = parseInt(document.getElementById('linkAmount').value);
        const expiry = document.getElementById('linkExpiry').value;
        const msg = document.getElementById('formMsg');

        if (!name) {
            msg.textContent = "❌ Veuillez entrer un nom";
            msg.className = "msg error";
            return;
        }
        if (!desc) {
            msg.textContent = "❌ Veuillez entrer une description";
            msg.className = "msg error";
            return;
        }
        if (!amount || amount < 1) {
            msg.textContent = "❌ Montant minimum : 1 FIX";
            msg.className = "msg error";
            return;
        }

        msg.textContent = "⏳ Génération du lien...";
        msg.className = "msg";

        try {
            const r = await fetch("/api/payment-link/create", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: name,
                    description: desc,
                    amount: amount,
                    expiry: expiry,
                    image: selectedImage || null
                })
            });
            const d = await r.json();

            if (d.success) {
                generatedLink = d.link;
                document.getElementById('generatedLink').textContent = generatedLink;
                document.getElementById('previewName').textContent = name;
                document.getElementById('previewAmount').textContent = amount + ' FIX';
                document.getElementById('previewDesc').textContent = desc;
                document.getElementById('linkResult').classList.remove('hidden');
                msg.textContent = "✅ Lien généré avec succès !";
                msg.className = "msg success";

                await loadLinks();
            } else {
                msg.textContent = "❌ " + d.error;
                msg.className = "msg error";
            }
        } catch (e) {
            msg.textContent = "❌ Erreur réseau";
            msg.className = "msg error";
        }
    }

    // ============================================================
    //  COPIER / PARTAGER
    // ============================================================
    function copyLink() {
        const url = document.getElementById('generatedLink').textContent;
        if (navigator.clipboard) {
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.querySelector('.link-url .copy-btn');
                btn.innerHTML = '<span style="color:#0ecb81;">✅</span>';
                setTimeout(() => {
                    btn.innerHTML = `<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>`;
                }, 2000);
            });
        } else {
            const input = document.createElement('input');
            input.value = url;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            alert('Lien copié !');
        }
    }

    function shareLink() {
        const url = document.getElementById('generatedLink').textContent;
        if (navigator.share) {
            navigator.share({
                title: 'Paiement en FIX',
                text: 'Payez en FIX via ce lien',
                url: url
            });
        } else {
            copyLink();
        }
    }

    function closeResult() {
        document.getElementById('linkResult').classList.add('hidden');
        document.getElementById('formMsg').textContent = '';
        document.getElementById('formMsg').className = 'msg';
    }

// ============================================================
//  LISTE DES LIENS
// ============================================================
async function loadLinks() {
    try {
        const r = await fetch("/api/payment-link/list");
        const d = await r.json();
        if (d.success) {
            links = d.links || [];
            renderLinks();
        }
    } catch(e) {
        console.error('Erreur chargement liens:', e);
    }
}

function renderLinks() {
    const container = document.getElementById('linksList');
    document.getElementById('linkCount').textContent = links.length;

    if (links.length === 0) {
        container.innerHTML = '<div class="history-empty" style="padding:20px;text-align:center;color:#666;">Aucun lien créé</div>';
        return;
    }

    let html = '';
    for (const link of links.slice(0, 10)) {
        // Déterminer le statut
        let statusClass = 'active';
        let statusLabel = 'Actif';
        
        if (link.status === 'paid') {
            statusClass = 'paid';
            statusLabel = 'Payé';
        } else if (link.status === 'expired') {
            statusClass = 'expired';
            statusLabel = 'Expiré';
        } else if (link.status === 'inactive') {
            statusClass = 'inactive';
            statusLabel = 'Inactif';
        } else {
            // Vérifier si le lien a expiré
            if (link.expires_at) {
                const expiresAt = new Date(link.expires_at);
                if (new Date() > expiresAt) {
                    statusClass = 'expired';
                    statusLabel = 'Expiré';
                }
            }
        }
        
        // Formater la date
        const dateObj = new Date(link.date);
        const dateStr = dateObj.toLocaleDateString('fr-FR', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
        
        html += `
            <div class="link-item" onclick="showLinkDetail('${link.id}')">
                <div class="l-left">
                    <span class="l-name">${escapeHtml(link.name)}</span>
                    <span class="l-date">${dateStr}</span>
                </div>
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                    <span class="l-amount">${link.amount} FIX</span>
                    <span class="l-status ${statusClass}">${statusLabel}</span>
                </div>
            </div>
        `;
    }
    container.innerHTML = html;
}

// Fonction pour échapper les caractères HTML
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

function showLinkDetail(id) {
    const link = links.find(l => l.id === id);
    if (!link) {
        alert('❌ Lien introuvable');
        return;
    }
    
    // Créer une modale personnalisée avec les détails
    const modal = document.createElement('div');
    modal.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.85);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        padding: 20px;
        animation: fadeIn 0.3s ease;
    `;
    
    // Déterminer le statut
    let statusText = 'Actif';
    let statusColor = '#0ecb81';
    if (link.status === 'paid') {
        statusText = 'Payé';
        statusColor = '#0ecb81';
    } else if (link.status === 'expired') {
        statusText = 'Expiré';
        statusColor = '#f6465d';
    } else if (link.status === 'inactive') {
        statusText = 'Inactif';
        statusColor = '#ffa500';
    }
    
    // Vérifier expiration
    let expiryText = 'Jamais';
    let isExpired = false;
    if (link.expires_at) {
        const expiresDate = new Date(link.expires_at);
        isExpired = new Date() > expiresDate;
        expiryText = expiresDate.toLocaleString('fr-FR') + (isExpired ? ' (Expiré)' : '');
    }
    
    modal.innerHTML = `
        <div style="
            background: #0f0f0f;
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        ">
            <!-- Bouton fermer -->
            <button onclick="this.closest('div[style]').remove()" style="
                position: absolute;
                top: 12px;
                right: 12px;
                background: transparent;
                border: none;
                color: #666;
                cursor: pointer;
                padding: 4px;
                transition: color 0.2s;
            " onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#666'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
            
            <!-- Icône du lien -->
            <div style="text-align:center;margin-bottom:16px;">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#0ecb81" stroke-width="1.5">
                    <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
                    <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
                </svg>
            </div>
            
            <h2 style="color:#fff;font-size:20px;text-align:center;margin-bottom:16px;">Détail du lien</h2>
            
            <!-- Infos -->
            <div style="display:grid;gap:12px;">
                <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a1a;">
                    <span style="color:#888;">Nom</span>
                    <span style="color:#fff;font-weight:500;">${escapeHtml(link.name)}</span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a1a;">
                    <span style="color:#888;">Description</span>
                    <span style="color:#fff;font-weight:500;text-align:right;max-width:60%;">${escapeHtml(link.description || 'Aucune')}</span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a1a;">
                    <span style="color:#888;">Montant</span>
                    <span style="color:#f0b90b;font-weight:700;">${link.amount} FIX</span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a1a;">
                    <span style="color:#888;">Créé le</span>
                    <span style="color:#fff;">${new Date(link.date).toLocaleString('fr-FR')}</span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a1a;">
                    <span style="color:#888;">Statut</span>
                    <span style="color:${statusColor};font-weight:600;">${statusText}</span>
                </div>
                <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a1a;">
                    <span style="color:#888;">Expiration</span>
                    <span style="color:${isExpired ? '#f6465d' : '#fff'};">${expiryText}</span>
                </div>
                ${link.paid_by ? `
                <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a1a;">
                    <span style="color:#888;">Payé par</span>
                    <span style="color:#0ecb81;font-weight:500;">${escapeHtml(link.paid_by)}</span>
                </div>
                ` : ''}
                ${link.paid_at ? `
                <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #1a1a1a;">
                    <span style="color:#888;">Payé le</span>
                    <span style="color:#fff;">${new Date(link.paid_at).toLocaleString('fr-FR')}</span>
                </div>
                ` : ''}
            </div>
            
            <!-- Lien -->
            <div style="margin-top:16px;padding:12px;background:#000;border-radius:8px;border:1px solid #1a1a1a;word-break:break-all;">
                <span style="color:#0ecb81;font-size:13px;">${window.location.origin}/pay/${link.id}</span>
            </div>
            
            <!-- Boutons -->
            <div style="display:flex;gap:8px;margin-top:16px;">
                <button onclick="window.open('/pay/${link.id}','_blank')" style="
                    flex:1;
                    padding:10px;
                    background:#0ecb81;
                    color:#000;
                    border:none;
                    border-radius:8px;
                    font-weight:700;
                    cursor:pointer;
                    font-family:inherit;
                    transition:background 0.2s;
                " onmouseover="this.style.background='#0dd68a'" onmouseout="this.style.background='#0ecb81'">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:4px;">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                        <polyline points="15 3 21 3 21 9"/>
                        <line x1="10" y1="14" x2="21" y2="3"/>
                    </svg>
                    Ouvrir
                </button>
                <button onclick="copyLinkDetail('${window.location.origin}/pay/${link.id}')" style="
                    flex:1;
                    padding:10px;
                    background:#1a1a1a;
                    color:#fff;
                    border:1px solid #2a2a2a;
                    border-radius:8px;
                    font-weight:600;
                    cursor:pointer;
                    font-family:inherit;
                    transition:all 0.2s;
                " onmouseover="this.style.background='#2a2a2a'" onmouseout="this.style.background='#1a1a1a'">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:4px;">
                        <rect x="9" y="9" width="13" height="13" rx="2"/>
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                    </svg>
                    Copier
                </button>
                <button onclick="this.closest('div[style]').remove()" style="
                    padding:10px;
                    background:transparent;
                    color:#888;
                    border:1px solid #2a2a2a;
                    border-radius:8px;
                    cursor:pointer;
                    font-family:inherit;
                    transition:all 0.2s;
                " onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#888'">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>
    `;
    
    document.body.appendChild(modal);
    
    // Animation fadeIn
    const style = document.createElement('style');
    style.textContent = `
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    `;
    document.head.appendChild(style);
}

function copyLinkDetail(url) {
    if (navigator.clipboard) {
        navigator.clipboard.writeText(url).then(() => {
            // Feedback visuel
            const btns = document.querySelectorAll('button');
            for (const btn of btns) {
                if (btn.textContent.includes('Copier')) {
                    const originalText = btn.innerHTML;
                    btn.innerHTML = '✅ Copié !';
                    setTimeout(() => {
                        btn.innerHTML = originalText;
                    }, 2000);
                    break;
                }
            }
        });
    } else {
        const input = document.createElement('input');
        input.value = url;
        document.body.appendChild(input);
        input.select();
        document.execCommand('copy');
        document.body.removeChild(input);
        alert('Lien copié !');
    }
}

    // ============================================================
    //  INIT
    // ============================================================
    async function init() {
        await loadUserInfo();
        await loadLinks();
    }

    init();
</script>
