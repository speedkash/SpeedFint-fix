<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Explorateur de transactions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0b0b0b;
            color: #e8e8e8;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 70px;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0b0b0b; }
        ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

        .header {
            background: #0a0a0a;
            border-bottom: 1px solid #1a1a1a;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header-left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .logo { font-weight: 700; font-size: 20px; letter-spacing: -0.3px; color: #fff; text-decoration: none; }
        .logo .accent { color: #0ecb81; }
        .header-right { display: flex; align-items: center; gap: 6px; }
        .btn-header {
            padding: 7px 16px;
            border: 1px solid #2a2a2a;
            background: transparent;
            color: #aaa;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
            font-family: inherit;
        }
        .btn-header:hover { background: #1a1a1a; color: #fff; border-color: #3a3a3a; }
        .btn-header.primary { background: #0ecb81; border-color: #0ecb81; color: #000; }
        .btn-header.primary:hover { background: #0dd68a; }
        .header-user { font-size: 13px; color: #888; padding: 0 4px; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0f0f0f;
            border-top: 1px solid #1a1a1a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 64px;
            z-index: 1000;
            padding: 0 8px;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            padding: 6px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            color: #555;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.3px;
            min-width: 60px;
            background: transparent;
            border: none;
            font-family: inherit;
        }
        .nav-item .nav-icon { width: 22px; height: 22px; stroke: currentColor; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .nav-item:hover { color: #888; }
        .nav-item.active { color: #0ecb81; }
        .nav-item.active .nav-icon { stroke: #0ecb81; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px 20px 100px 20px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .page-sub {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
        }

        /* ===== FILTRES ===== */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 16px;
            align-items: center;
        }
        .filters .filter-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #0f0f0f;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 4px 12px 4px 4px;
        }
        .filters .filter-group label {
            font-size: 12px;
            color: #666;
            padding-left: 8px;
        }
        .filters .filter-group input,
        .filters .filter-group select {
            background: transparent;
            border: none;
            color: #fff;
            padding: 6px 8px;
            font-size: 13px;
            font-family: inherit;
            outline: none;
            min-width: 120px;
        }
        .filters .filter-group select option { background: #0f0f0f; }
        .filters .btn-filter {
            padding: 6px 16px;
            background: #0ecb81;
            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            font-size: 13px;
            transition: all 0.2s;
        }
        .filters .btn-filter:hover { background: #0dd68a; }
        .filters .btn-filter.reset {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #aaa;
        }
        .filters .btn-filter.reset:hover { background: #1a1a1a; color: #fff; }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .stats-bar .stat {
            font-size: 13px;
            color: #888;
        }
        .stats-bar .stat strong {
            color: #fff;
            font-weight: 600;
        }
        .stats-bar .stat .green { color: #0ecb81; }
        .stats-bar .stat .red { color: #f6465d; }

        /* ===== TABLE ===== */
        .table-wrap {
            background: #0f0f0f;
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            overflow: hidden;
        }
        .table-scroll {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            min-width: 600px;
        }
        th {
            text-align: left;
            padding: 10px 14px;
            color: #555;
            font-weight: 500;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            border-bottom: 1px solid #161616;
            background: #0a0a0a;
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
            position: sticky;
            top: 0;
            z-index: 2;
        }
        th:hover { color: #ccc; }
        th .sort-icon { margin-left: 4px; opacity: 0.3; }
        th.active .sort-icon { opacity: 1; color: #0ecb81; }
        td {
            padding: 8px 14px;
            border-bottom: 1px solid #121212;
            font-family: 'Inter', monospace;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #141414; }
        .text-right { text-align: right; }
        .text-center { text-align: center; }

        .type-badge {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            padding: 2px 10px;
            border-radius: 10px;
        }
        .type-badge.buy { background: rgba(14,203,129,0.12); color: #0ecb81; }
        .type-badge.sell { background: rgba(246,70,93,0.12); color: #f6465d; }

        .price-buy { color: #0ecb81; }
        .price-sell { color: #f6465d; }

        .user-anon { color: #888; font-family: 'Inter', sans-serif; }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #555;
            font-size: 14px;
        }

        .pagination {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-top: 1px solid #161616;
            flex-wrap: wrap;
            gap: 8px;
        }
        .pagination .info { font-size: 12px; color: #666; }
        .pagination .pages { display: flex; gap: 4px; }
        .pagination .pages button {
            padding: 4px 10px;
            border: 1px solid #2a2a2a;
            background: transparent;
            color: #888;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: all 0.15s;
        }
        .pagination .pages button:hover { background: #1a1a1a; color: #fff; }
        .pagination .pages button.active {
            background: #0ecb81;
            color: #000;
            border-color: #0ecb81;
        }
        .pagination .pages button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #0ecb81;
            background: rgba(14,203,129,0.08);
            padding: 2px 12px;
            border-radius: 20px;
        }
        .live-badge .dot {
            width: 6px;
            height: 6px;
            background: #0ecb81;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @media (max-width: 768px) {
            .container { padding: 12px 12px 100px 12px; }
            .page-title { font-size: 20px; }
            .filters { flex-direction: column; align-items: stretch; }
            .filters .filter-group { width: 100%; }
            .filters .filter-group input,
            .filters .filter-group select { min-width: auto; flex: 1; }
            .stats-bar { gap: 12px; font-size: 12px; }
            table { font-size: 12px; min-width: 500px; }
            th, td { padding: 6px 10px; }
        }
        @media (max-width: 480px) {
            .page-title { font-size: 17px; }
            .pagination { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-left">
        <a href="/" class="logo"><span class="accent">FIX</span>/USD</a>
        <span class="live-badge"><span class="dot"></span> En direct</span>
    </div>
    <div class="header-right">
        <span class="header-user" id="header_user">--</span>
        <button class="btn-header" onclick="window.location.href='/admin'" id="admin_btn" style="display:none;">Admin</button>
        <button class="btn-header primary" onclick="doLogout()" id="logout_btn" style="display:none;">Déconnexion</button>
    </div>
</header>

<div class="container">

    <div class="page-title"> Explorateur de transactions</div>
    <div class="page-sub">Toutes les transactions du marché FIX en temps réel</div>

    <!-- STATS -->
    <div class="stats-bar" id="statsBar">
        <span class="stat">Total transactions : <strong id="totalTrades">0</strong></span>
        <span class="stat">Volume total : <strong id="totalVolume">0</strong> FIX</span>
        <span class="stat">Dernier prix : <strong id="lastPrice">--</strong></span>
        <span class="stat">Achats : <strong class="green" id="buyCount">0</strong></span>
        <span class="stat">Ventes : <strong class="red" id="sellCount">0</strong></span>
    </div>

    <!-- FILTRES -->
    <div class="filters">
        <div class="filter-group">
            <label>🔍</label>
            <input type="text" id="searchInput" placeholder="Rechercher un nom..." oninput="applyFilters()">
        </div>
        <div class="filter-group">
            <label>Type</label>
            <select id="typeFilter" onchange="applyFilters()">
                <option value="all">Tous</option>
                <option value="buy">Achats</option>
                <option value="sell">Ventes</option>
            </select>
        </div>
        <div class="filter-group">
            <label>📅</label>
            <input type="date" id="dateFilter" onchange="applyFilters()">
        </div>
        <button class="btn-filter" onclick="applyFilters()">Appliquer</button>
        <button class="btn-filter reset" onclick="resetFilters()">Réinitialiser</button>
        <button class="btn-filter" onclick="refreshData()" style="background:transparent;border:1px solid #2a2a2a;color:#aaa;">↻</button>
    </div>

    <!-- TABLE -->
    <div class="table-wrap">
        <div class="table-scroll">
            <table>
                <thead>
                    <tr>
                        <th onclick="sortBy('time')" id="sortTime">Heure <span class="sort-icon">↕</span></th>
                        <th onclick="sortBy('buyer')" id="sortBuyer">Acheteur <span class="sort-icon">↕</span></th>
                        <th onclick="sortBy('seller')" id="sortSeller">Vendeur <span class="sort-icon">↕</span></th>
                        <th onclick="sortBy('price')" id="sortPrice" class="active">Prix <span class="sort-icon">↕</span></th>
                        <th onclick="sortBy('quantity')" id="sortQty">Quantité <span class="sort-icon">↕</span></th>
                        <th onclick="sortBy('total')" id="sortTotal">Total USD <span class="sort-icon">↕</span></th>
                        <th class="text-center">Type</th>
                    </tr>
                </thead>
                <tbody id="tradesBody">
                    <tr><td colspan="7"><div class="empty-state">Chargement des transactions...</div></td></tr>
                </tbody>
            </table>
        </div>
        <div class="pagination">
            <span class="info" id="paginationInfo">Affichage 0-0 sur 0</span>
            <div class="pages" id="paginationPages">
                <button onclick="prevPage()" id="prevBtn">‹</button>
                <button class="active">1</button>
                <button onclick="nextPage()" id="nextBtn">›</button>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
    // ============================================================
    //  CONFIGURATION
    // ============================================================
    const socket = io();
    let allTrades = [];
    let filteredTrades = [];
    let currentPage = 1;
    const itemsPerPage = 25;
    let sortField = 'time';
    let sortAsc = false;
    let currentUser = null;

    // ============================================================
    //  AUTH
    // ============================================================
    async function doLogout() {
        await fetch("/api/logout", {method: "POST"});
        window.location.href = "/";
    }

    async function loadUserInfo() {
        try {
            const r = await fetch("/api/me");
            const d = await r.json();
            if (d.success && d.user) {
                currentUser = d.user;
                document.getElementById("header_user").textContent = d.user.username;
                if (d.user.role === "admin") {
                    document.getElementById("admin_btn").style.display = "inline-block";
                }
                document.getElementById("logout_btn").style.display = "inline-block";
            }
        } catch(e) {}
    }

    // ============================================================
    //  CHARGEMENT DES DONNÉES
    // ============================================================
    async function loadTrades() {
        try {
            const r = await fetch("/api/trades");
            const data = await r.json();
            
            if (Array.isArray(data)) {

                const reversed = data.reverse();
               
                allTrades = data.map(t => ({
                    ...t,
                    type: t.buyer === currentUser?.username ? 'buy' : 'sell'
                }));
                filteredTrades = [...allTrades];
                applyFilters();
                updateStats();
                renderTable();
            }
        } catch(e) {
            console.error('Erreur chargement trades:', e);
        }
    }

    // ============================================================
    //  FILTRES
    // ============================================================
    function applyFilters() {
        const search = document.getElementById('searchInput').value.toLowerCase().trim();
        const type = document.getElementById('typeFilter').value;
        const date = document.getElementById('dateFilter').value;

        filteredTrades = allTrades.filter(t => {
            // Recherche
            if (search) {
                const buyerMatch = t.buyer?.toLowerCase().includes(search) || false;
                const sellerMatch = t.seller?.toLowerCase().includes(search) || false;
                if (!buyerMatch && !sellerMatch) return false;
            }
            // Type
            if (type !== 'all') {
                const isBuy = t.buyer === currentUser?.username;
                if (type === 'buy' && !isBuy) return false;
                if (type === 'sell' && isBuy) return false;
            }
            // Date
            if (date) {
                const tradeDate = new Date(t.timestamp).toISOString().split('T')[0];
                if (tradeDate !== date) return false;
            }
            return true;
        });

        currentPage = 1;
        renderTable();
        updateStats();
    }

    function resetFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('typeFilter').value = 'all';
        document.getElementById('dateFilter').value = '';
        applyFilters();
    }

    function refreshData() {
        loadTrades();
    }

    // ============================================================
    //  TRI
    // ============================================================
    function sortBy(field) {
        if (sortField === field) {
            sortAsc = !sortAsc;
        } else {
            sortField = field;
            sortAsc = false;
        }

        document.querySelectorAll('th').forEach(th => th.classList.remove('active'));
        const th = document.getElementById('sort' + field.charAt(0).toUpperCase() + field.slice(1));
        if (th) th.classList.add('active');

        filteredTrades.sort((a, b) => {
            let valA = a[field] || '';
            let valB = b[field] || '';
            if (typeof valA === 'string') valA = valA.toLowerCase();
            if (typeof valB === 'string') valB = valB.toLowerCase();
            if (valA < valB) return sortAsc ? -1 : 1;
            if (valA > valB) return sortAsc ? 1 : -1;
            return 0;
        });

        currentPage = 1;
        renderTable();
    }

// ============================================================
//  ANONYMISATION
// ============================================================
function anonymizeUser(username, userId) {
    // Les bots restent visibles
    if (username && username.startsWith('bot_')) {
        return username;
    }
    // Admin et utilisateurs normaux → anonymisés
    if (username) {
        return 'user_' + String(userId).padStart(4, '0') + '****';
    }
    return '--';
}

// ============================================================
//  RENDU
// ============================================================
function renderTable() {
    const tbody = document.getElementById('tradesBody');
    const start = (currentPage - 1) * itemsPerPage;
    const end = Math.min(start + itemsPerPage, filteredTrades.length);
    const pageItems = filteredTrades.slice(start, end);

    if (pageItems.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state">Aucune transaction trouvée</div></td></tr>`;
        updatePagination();
        return;
    }

    let html = '';
    for (const t of pageItems) {
        const isBuy = t.buyer === currentUser?.username;
        const typeClass = isBuy ? 'buy' : 'sell';
        const typeLabel = isBuy ? 'ACHAT' : 'VENTE';
        const priceClass = isBuy ? 'price-buy' : 'price-sell';
        const time = new Date(t.timestamp).toLocaleString('fr-FR', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            day: '2-digit',
            month: '2-digit',
            year: 'numeric'
        });

        // 🔥 ANONYMISATION
        const buyerDisplay = anonymizeUser(t.buyer, t.buyer_id);
        const sellerDisplay = anonymizeUser(t.seller, t.seller_id);

        // 🔥 Mettre en évidence les trades de l'utilisateur connecté
        const isMyTrade = t.buyer === currentUser?.username || t.seller === currentUser?.username;
        const myClass = isMyTrade ? ' style="background:rgba(14,203,129,0.05);"' : '';

        html += `<tr${myClass}>
            <td class="text-muted">${time}</td>
            <td class="user-anon">${buyerDisplay}</td>
            <td class="user-anon">${sellerDisplay}</td>
            <td class="${priceClass}">${Number(t.price).toFixed(6)}</td>
            <td>${t.quantity.toLocaleString()}</td>
            <td>${Number(t.total || t.price * t.quantity).toFixed(4)}</td>
            <td class="text-center"><span class="type-badge ${typeClass}">${typeLabel}</span></td>
        </tr>`;
    }
    tbody.innerHTML = html;
    updatePagination();
}

    function updateStats() {
        document.getElementById('totalTrades').textContent = filteredTrades.length;
        document.getElementById('totalVolume').textContent = filteredTrades.reduce((sum, t) => sum + t.quantity, 0).toLocaleString();
        
        const last = filteredTrades[0];
        if (last) {
            document.getElementById('lastPrice').textContent = Number(last.price).toFixed(6) + ' $';
        }

        const buys = filteredTrades.filter(t => t.buyer === currentUser?.username).length;
        document.getElementById('buyCount').textContent = buys;
        document.getElementById('sellCount').textContent = filteredTrades.length - buys;
    }

    function updatePagination() {
        const total = filteredTrades.length;
        const totalPages = Math.ceil(total / itemsPerPage);
        const start = (currentPage - 1) * itemsPerPage + 1;
        const end = Math.min(currentPage * itemsPerPage, total);

        document.getElementById('paginationInfo').textContent = `Affichage ${total > 0 ? start : 0}-${end} sur ${total}`;

        const container = document.getElementById('paginationPages');
        let html = '';
        html += `<button onclick="prevPage()" ${currentPage <= 1 ? 'disabled' : ''}>‹</button>`;
        
        const maxVisible = 5;
        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, startPage + maxVisible - 1);
        if (endPage - startPage < maxVisible - 1) {
            startPage = Math.max(1, endPage - maxVisible + 1);
        }

        for (let i = startPage; i <= endPage; i++) {
            html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
        }
        html += `<button onclick="nextPage()" ${currentPage >= totalPages ? 'disabled' : ''}>›</button>`;
        container.innerHTML = html;
    }

    // ============================================================
    //  PAGINATION
    // ============================================================
    function goToPage(page) {
        const totalPages = Math.ceil(filteredTrades.length / itemsPerPage);
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderTable();
    }

    function prevPage() {
        if (currentPage > 1) {
            currentPage--;
            renderTable();
        }
    }

    function nextPage() {
        const totalPages = Math.ceil(filteredTrades.length / itemsPerPage);
        if (currentPage < totalPages) {
            currentPage++;
            renderTable();
        }
    }

    // ============================================================
    //  WEBSOCKET - TEMPS RÉEL
    // ============================================================
    socket.on("connect", () => {
        console.log("WebSocket connecté");
    });

    socket.on("trade", (trade) => {
        if (!trade) return;
        const newTrade = {
            ...trade,
            type: trade.buyer === currentUser?.username ? 'buy' : 'sell'
        };
        allTrades.unshift(newTrade);
        if (allTrades.length > 1000) allTrades.pop();
        applyFilters();
        updateStats();
    });

    // ============================================================
    //  INIT
    // ============================================================
    async function init() {
        await loadUserInfo();
        await loadTrades();

        // Rafraîchir toutes les 10 secondes
        setInterval(() => {
            loadTrades();
        }, 10000);
    }

    init();
</script>

</body>
</html>
